name: Halle Appointment Check

on:
  schedule:
    # Every 20 minutes
    - cron: "*/20 * * * *"
  workflow_dispatch:

concurrency:
  group: halle-appointment-check
  cancel-in-progress: true

jobs:
  check-and-notify:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Capture page snapshot (for debugging)
        run: |
          mkdir -p debug
          python - <<'PY'
          import asyncio
          from playwright.async_api import async_playwright

          URL = "https://itc-halle.saas.smartcjm.com/m/standesamt/extern/calendar/?uid=9da900ff-e9a5-46be-a622-ecdfa078121c"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(locale="de-DE")
                  page = await context.new_page()
                  await page.goto(URL, wait_until="networkidle")
                  await page.wait_for_timeout(8000)

                  html = await page.content()
                  text = await page.locator("body").text_content()

                  with open("debug/page.html", "w", encoding="utf-8") as f:
                      f.write(html)
                  with open("debug/body.txt", "w", encoding="utf-8") as f:
                      f.write(text or "")

                  await page.screenshot(path="debug/page.png", full_page=True)

                  info = await page.evaluate("""() => ({
                    title: document.title,
                    url: location.href,
                    webdriver: navigator.webdriver,
                    lang: document.documentElement.lang,
                    bodyStart: (document.body?.innerText || '').slice(0, 2000)
                  })""")
                  import json
                  with open("debug/info.json", "w", encoding="utf-8") as f:
                      json.dump(info, f, ensure_ascii=False, indent=2)

                  await browser.close()

          asyncio.run(main())
          PY

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-debug
          path: debug/

      - name: Run one-shot appointment check and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_NO_APPOINTMENT_MESSAGE: "true"
        run: python run_check_once.py
